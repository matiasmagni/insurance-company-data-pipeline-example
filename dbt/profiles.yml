dbt_insurance:
  target: dev
  
  outputs:
    dev:
      type: clickhouse
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8123') | as_number }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', 'clickhouse_pass') }}"
      dbname: "{{ env_var('CLICKHOUSE_DB', 'insurance_db') }}"
      schema: ""